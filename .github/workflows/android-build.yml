name: Android Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed for the release step on tags

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yt-plucker-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |
            Xyrus' YT Plucker — Android video & playlist downloader (YouTube & X).

            Install the APK matching your device ABI (arm64-v8a for most phones), or the
            universal APK. yt-dlp and ffmpeg are bundled inside the app; no extra setup is
            required.

            Signed with the project's stable key, so updates install straight over a previous
            install. **One-time note:** if you have an older build signed with a different key,
            uninstall it once before installing this one.
